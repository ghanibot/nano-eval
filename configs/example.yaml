name: "example-eval"

model:
  provider: anthropic
  model: "claude-haiku-4-5-20251001"
  max_tokens: 512
  temperature: 0.0

judge:
  model: "claude-haiku-4-5-20251001"
  provider: anthropic

max_concurrency: 3
fail_fast: false

cases:
  - id: python-function
    description: "Model can write basic Python"
    input: "Write a Python function that returns the fibonacci sequence up to n"
    expected: "def "
    evaluator: contains

  - id: rest-api-explanation
    description: "Model explains REST API clearly"
    input: "Explain what a REST API is in 2 sentences"
    evaluator: llm-judge
    min_score: 4
    criteria: "accuracy and clarity for a beginner audience"

  - id: json-output
    description: "Model outputs valid JSON"
    input: "Return a JSON object with keys: name, age, city. Use any values."
    expected: '"name"'
    evaluator: contains

  - id: haiku-poem
    description: "Model writes a haiku"
    input: "Write a haiku about programming"
    evaluator: llm-judge
    min_score: 3
    criteria: "follows 5-7-5 syllable structure"
